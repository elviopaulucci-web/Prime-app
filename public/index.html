<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" content="#c8f135"><title>Prime · Listas</title><link rel="manifest" href="/manifest.json"><style>:root{--bg:#0f0f0f;--sur:#1a1a1a;--bor:#2e2e2e;--acc:#c8f135;--txt:#f0f0f0;--mut:#666;--A:#c8f135;--B:#35c8f1;--C:#f16035}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden}body{background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;display:flex;flex-direction:column;height:100dvh}.hdr{padding:16px 20px;background:var(--sur);border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:12px;flex-shrink:0}.logo{background:var(--acc);color:#000;font-weight:800;font-size:12px;letter-spacing:2px;padding:5px 10px}.hdr-t{font-size:14px;font-weight:600;color:var(--mut);flex:1}.scr{display:none;flex:1;flex-direction:column;overflow:hidden}.scr.on{display:flex}.home-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:32px 24px}.hi{font-size:52px}.ht{font-size:22px;font-weight:800;text-align:center}.hs{font-size:13px;color:var(--mut);text-align:center;line-height:1.6}.btn-cam{width:100%;max-width:320px;background:var(--acc);color:#000;border:none;padding:18px;font-size:16px;font-weight:700;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;gap:10px}.btn-cam:active{opacity:.8}.btn-gal{width:100%;max-width:320px;background:transparent;color:var(--txt);border:1px solid var(--bor);padding:16px;font-size:14px;font-weight:600;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;gap:10px}.leg-r{display:flex;gap:16px}.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mut)}.leg-d{width:8px;height:8px;border-radius:50%}.load-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}.prev{width:140px;height:180px;object-fit:cover;border:1px solid var(--bor);border-radius:4px}.spin{width:34px;height:34px;border:3px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}.lt{font-size:13px;color:var(--mut)}.res-b{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--bor);border-bottom:1px solid var(--bor)}.sc{background:var(--sur);padding:14px 10px;position:relative}.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}.sc.A::before{background:var(--A)}.sc.B::before{background:var(--B)}.sc.C::before{background:var(--C)}.sl{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--mut)}.st{font-size:10px;margin:2px 0}.sc.A .st{color:var(--A)}.sc.B .st{color:var(--B)}.sc.C .st{color:var(--C)}.sv{font-size:22px;font-weight:800;line-height:1}.sc.A .sv{color:var(--A)}.sc.B .sv{color:var(--B)}.sc.C .sv{color:var(--C)}.su{font-size:10px;color:var(--mut)}.tot{padding:12px 20px;background:#242424;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center}.tl{font-size:11px;color:var(--mut);text-transform:uppercase}.tv{font-size:20px;font-weight:800}.inf{padding:8px 20px;background:var(--sur);border-bottom:1px solid var(--bor);font-size:11px;color:var(--mut)}.stt{padding:10px 20px 6px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);font-weight:600;border-bottom:1px solid var(--bor);position:sticky;top:0;background:var(--bg);z-index:1}.pr{padding:10px 20px;border-bottom:1px solid var(--bor)}.pt{display:flex;justify-content:space-between;gap:8px;margin-bottom:3px}.pd{font-size:12px;font-weight:600;flex:1;line-height:1.3}.pq{font-size:11px;color:var(--mut)}.pb{display:flex;justify-content:space-between;align-items:center}.pdim{font-size:10px;color:var(--mut)}.pf{display:flex;gap:3px}.ft{padding:2px 6px;border-radius:2px;font-size:10px;font-weight:700}.ft.A{background:rgba(200,241,53,.15);color:var(--A);border:1px solid rgba(200,241,53,.3)}.ft.B{background:rgba(53,200,241,.15);color:var(--B);border:1px solid rgba(53,200,241,.3)}.ft.C{background:rgba(241,96,53,.15);color:var(--C);border:1px solid rgba(241,96,53,.3)}.pm2{font-size:10px;color:var(--mut)}.bot{padding:12px 20px;background:var(--sur);border-top:1px solid var(--bor);display:flex;gap:8px;flex-shrink:0}.btn-n{flex:1;background:var(--acc);color:#000;border:none;padding:14px;font-size:13px;font-weight:700;cursor:pointer;border-radius:4px}.btn-s{background:transparent;color:var(--txt);border:1px solid var(--bor);padding:14px 16px;font-size:18px;cursor:pointer;border-radius:4px}.err-b{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px;text-align:center}.ei{font-size:40px}.em{font-size:16px;font-weight:700;color:var(--C)}.ed{font-size:12px;color:var(--mut);line-height:1.6}.btn-r{background:transparent;color:var(--txt);border:1px solid var(--bor);padding:12px 24px;font-size:13px;font-weight:600;cursor:pointer;border-radius:4px}</style></head><body>
<div class="hdr"><div class="logo">PRIME</div><div class="hdr-t">Analisador de Listas</div></div>
<div class="scr on" id="sHome"><div class="home-b"><div class="hi">📋</div><div class="ht">Analisar Lista de Materiais</div><div class="hs">Tire uma foto da lista ou escolha da galeria.<br>A IA calcula os m² automaticamente.</div><button class="btn-cam" onclick="document.getElementById('iCam').click()">📷 Abrir Câmera</button><button class="btn-gal" onclick="document.getElementById('iGal').click()">🖼️ Escolher da Galeria</button><div class="leg-r"><div class="leg"><div class="leg-d" style="background:var(--A)"></div>A=boa</div><div class="leg"><div class="leg-d" style="background:var(--B)"></div>B=interna</div><div class="leg"><div class="leg-d" style="background:var(--C)"></div>C=ruim</div></div></div></div>
<div class="scr" id="sLoad"><div class="load-b"><img id="prev" class="prev" src="" alt=""><div class="spin"></div><div class="lt">Analisando com IA...</div></div></div>
<div class="scr" id="sRes"><div class="res-b" id="resB"></div><div class="bot"><button class="btn-n" onclick="goHome()">📷 Nova Lista</button><button class="btn-s" onclick="share()">📤</button></div></div>
<div class="scr" id="sErr"><div class="err-b"><div class="ei">⚠️</div><div class="em">Erro ao analisar</div><div class="ed" id="errD">Verifique sua conexão.</div><button class="btn-r" onclick="goHome()">← Tentar Novamente</button></div></div>
<input type="file" id="iCam" accept="image/*" capture="environment" style="display:none">
<input type="file" id="iGal" accept="image/*" style="display:none">
<script>
if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
let dP;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dP=e;});
let res=null,b64=null,mime='image/jpeg';
document.getElementById('iCam').addEventListener('change',e=>go(e.target.files[0]));
document.getElementById('iGal').addEventListener('change',e=>go(e.target.files[0]));
function go(f){if(!f)return;mime=f.type||'image/jpeg';const r=new FileReader();r.onload=ev=>{const d=ev.target.result;b64=d.split(',')[1];document.getElementById('prev').src=d;analyze();};r.readAsDataURL(f);}
function ss(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}
function goHome(){document.getElementById('iCam').value='';document.getElementById('iGal').value='';ss('sHome');}
async function analyze(){ss('sLoad');try{const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({imageBase64:b64,imageMime:mime})});const d=await r.json();if(d.error)throw new Error(d.error);res=d;render(d);ss('sRes');if(dP){setTimeout(()=>{if(confirm('Instalar o app Prime na tela inicial?')){dP.prompt();dP=null;}},800);}}catch(e){document.getElementById('errD').textContent=e.message||'Erro desconhecido.';ss('sErr');}}
function render(d){const t=d.totais||{},p=d.pecas||[];const info=[d.obra,d.op?'OP:'+d.op:'',d.data].filter(Boolean).join(' · ');document.getElementById('resB').innerHTML=`<div class="sg">${['A','B','C'].map(f=>`<div class="sc ${f}"><div class="sl">Face ${f}</div><div class="st">${f==='A'?'Lâmina boa':f==='B'?'Interna':'Lâmina ruim'}</div><div class="sv">${(t[f]||0).toFixed(3)}</div><div class="su">m²</div></div>`).join('')}</div><div class="tot"><span class="tl">Total Geral</span><span class="tv">${(t.geral||0).toFixed(3)} m²</span></div>${info?`<div class="inf">${info}</div>`:''}<div class="stt">Detalhamento — ${p.length} peças</div>${p.map(x=>`<div class="pr"><div class="pt"><div class="pd">${x.descricao}</div><div class="pq">${x.qtd}×</div></div><div class="pb"><div class="pdim">${x.comp}×${x.larg}mm</div><div class="pf"><span class="ft ${x.face1}">${x.face1}</span><span class="ft ${x.face2}">${x.face2}</span></div><div class="pm2">${x.area_m2.toFixed(3)}m²</div></div></div>`).join('')}<div style="height:16px"></div>`;}
function share(){if(!res)return;const t=res.totais||{};const txt=`📋 Prime Marcenaria\n${res.obra?'Obra: '+res.obra:''}\n\n🟢 Face A: ${(t.A||0).toFixed(3)} m²\n🔵 Face B: ${(t.B||0).toFixed(3)} m²\n🔴 Face C: ${(t.C||0).toFixed(3)} m²\nTotal: ${(t.geral||0).toFixed(3)} m²`;if(navigator.share)navigator.share({title:'Prime',text:txt});else navigator.clipboard.writeText(txt).then(()=>alert('Copiado!'));}
</script></body></html>
